services:
  mysql:
    image: mysql:8.0
    container_name: ai_scheduler_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-event_scheduler_new}
      MYSQL_USER: ${MYSQL_USER:-scheduler}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-scheduler123}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_scheduler_backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_USER: ${MYSQL_USER:-scheduler}
      DB_PASSWORD: ${MYSQL_PASSWORD:-scheduler123}
      DB_NAME: ${MYSQL_DATABASE:-event_scheduler_new}
      FLASK_PORT: 5000
      FLASK_DEBUG: "False"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}
      GOOGLE_CREDENTIALS_FILE: /app/google-auth/credentials.json
      GOOGLE_TOKEN_FILE: /app/google-auth/token.json
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - backend_qr_codes:/app/qr_codes
      - ./backend/google-auth:/app/google-auth

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-/api}
    container_name: ai_scheduler_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql_data:
  backend_qr_codes:
